<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Shake-Out</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="theme-color" content="#f6f1e6">
	<meta name="generator" content="Shake-Out prototype">
	<link rel="manifest" href="appmanifest.json">
	<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
	<link rel="stylesheet" href="style.css?v=12">
</head>
<body>
	<script>
	if (location.protocol.substr(0, 4) === "file")
	{
		alert("Web exports won't work until you upload them or run a local server. Browsers block motion sensors and modules from the file: protocol.");
	}
	if ("serviceWorker" in navigator && /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/.test(location.hostname))
	{
		navigator.serviceWorker.getRegistrations()
			.then(registrations => registrations.forEach(registration => registration.unregister()))
			.catch(() => {});
		if (window.caches)
		{
			caches.keys()
				.then(keys => keys.filter(key => key.startsWith("shakeout-offline")).forEach(key => caches.delete(key)))
				.catch(() => {});
		}
	}
	</script>

	<noscript>
		<div id="notSupportedWrap">
			<h2 id="notSupportedTitle">This content requires JavaScript</h2>
			<p class="notSupportedMessage">JavaScript appears to be disabled. Please enable it to view this content.</p>
		</div>
	</noscript>

	<div id="app" class="app">
		<canvas id="gameCanvas" aria-label="Shake-Out jar game"></canvas>

		<header class="hud" aria-live="polite">
			<div class="coinCounter">
				<div class="label">Coins</div>
				<div id="coinHud" class="hudValue">0</div>
			</div>
			<div class="diagnostic">
				<div class="label">Ratio</div>
				<div id="ratioHud" class="hudValue">0</div>
			</div>
			<div class="diagnostic">
				<div class="label">Progress</div>
				<div id="progressHud" class="hudValue">0/0</div>
			</div>
			<button id="quitButton" class="iconTextButton danger hidden" type="button">Quit</button>
		</header>

		<section id="panel" class="panel" aria-live="polite">
			<div id="stateKicker" class="kicker">Calibration</div>
			<h1 id="stateTitle">Shake the jar</h1>
			<p id="stateBody">Hold the phone upright. We will first measure stillness, then collect eight comfortable flicks.</p>
			<div id="meter" class="meter" aria-hidden="true"><span></span></div>
			<div id="sampleDots" class="sampleDots" aria-hidden="true"></div>
			<div class="actions">
				<button id="primaryButton" class="primaryButton" type="button">Allow motion</button>
				<button id="secondaryButton" class="secondaryButton hidden" type="button">Use demo input</button>
			</div>
			<button id="simulateButton" class="ghostButton hidden" type="button">Test flick</button>
			<div id="statusLine" class="statusLine">Sensor permission is requested only after you tap.</div>
		</section>
	</div>

	<script src="scripts/modernjscheck.js?v=12"></script>
	<script src="scripts/supportcheck.js?v=12"></script>
	<script src="scripts/offlineclient.js?v=12" type="module"></script>
	<script src="scripts/main.js?v=12" type="module"></script>
	<script src="scripts/register-sw.js?v=12" type="module"></script>
</body>
</html>
